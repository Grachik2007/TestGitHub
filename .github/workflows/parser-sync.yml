name: 🔄 Daily Parser Sync - ctradei to GitHub Pages

on:
  schedule:
    # Каждый день в 00:30 MSK (21:30 UTC в зимнее время)
    - cron: '30 21 * * *'
  workflow_dispatch:  # Можно запустить вручную

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: 📚 Install dependencies
        run: |
          npm install axios xml2js csv-parse

      - name: 🔄 Run Parser Agent
        env:
          CTRADEI_LOGIN: ${{ secrets.CTRADEI_LOGIN }}
          CTRADEI_PASSWORD: ${{ secrets.CTRADEI_PASSWORD }}
        run: node .github/scripts/parser.js

      - name: 📊 Check generated files
        run: |
          ls -lah feeds/
          echo "Generated files:"
          file feeds/products.yml
          file feeds/products.csv

      - name: 🚀 Deploy to GitHub Pages
        run: |
          git config --local user.email "github-actions@github.com"
          git config --local user.name "GitHub Actions"

          # Configure git to use token for authentication
          git config --local credential.helper store
          echo "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com" > ~/.git-credentials

          # Create and checkout gh-pages branch
          git fetch origin gh-pages || true
          git checkout -B gh-pages origin/gh-pages || git checkout --orphan gh-pages

          # Copy feeds to repo root
          cp -r feeds/* .

          # Commit and push
          git add products.yml products.csv summary.json || true
          git commit -m "chore: update feeds from parser sync" || true
          git push -u origin gh-pages

      - name: ✅ Sync completed
        run: |
          echo "🎉 Синхронизация завершена!"
          echo "YML доступен по ссылке:"
          echo "https://grachik2007.github.io/TestGitHub/products.yml"
          echo ""
          echo "CSV доступен по ссылке:"
          echo "https://grachik2007.github.io/TestGitHub/products.csv"

      - name: 📧 Notify on failure
        if: failure()
        run: |
          echo "❌ Синхронизация не удалась!"
          echo "Проверьте логи на GitHub Actions"
