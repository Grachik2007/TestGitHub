name: 🔄 Daily Parser Sync - ctradei to GitHub Pages

on:
  schedule:
    # Каждый день в 00:30 MSK (21:30 UTC в зимнее время)
    - cron: '30 21 * * *'
  workflow_dispatch:  # Можно запустить вручную

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: 📚 Install dependencies
        run: |
          npm install axios xml2js csv-parse

      - name: 🔄 Run Parser Agent
        env:
          CTRADEI_LOGIN: ${{ secrets.CTRADEI_LOGIN }}
          CTRADEI_PASSWORD: ${{ secrets.CTRADEI_PASSWORD }}
        run: node .github/scripts/parser.js

      - name: 📊 Check generated files
        run: |
          ls -lah feeds/
          echo "Generated files:"
          file feeds/products.yml
          file feeds/products.csv

      - name: 🚀 Deploy to GitHub Pages
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --local user.email "github-actions@github.com"
          git config --local user.name "GitHub Actions"

          # Save feeds before any git operations
          mkdir -p /tmp/feeds
          cp -r feeds/* /tmp/feeds/

          # Reset to clean state
          git reset --hard HEAD

          # Fetch and checkout gh-pages using token in URL
          git fetch https://x-access-token:${GH_TOKEN}@github.com/Grachik2007/TestGitHub.git gh-pages
          git checkout gh-pages

          # Copy feeds to repo root
          cp /tmp/feeds/* .

          # Commit and push with token in URL
          git add products.yml products.csv summary.json || true
          git commit -m "chore: update feeds from parser sync" || true
          git push https://x-access-token:${GH_TOKEN}@github.com/Grachik2007/TestGitHub.git gh-pages -o ci.skip

      - name: ✅ Sync completed
        run: |
          echo "🎉 Синхронизация завершена!"
          echo "YML доступен по ссылке:"
          echo "https://grachik2007.github.io/TestGitHub/products.yml"
          echo ""
          echo "CSV доступен по ссылке:"
          echo "https://grachik2007.github.io/TestGitHub/products.csv"

      - name: 📧 Notify on failure
        if: failure()
        run: |
          echo "❌ Синхронизация не удалась!"
          echo "Проверьте логи на GitHub Actions"
